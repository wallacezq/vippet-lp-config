# Reference: Loss Prevention - Object Detection only pipeline (benchmarking workload)
# https://github.com/open-edge-platform/edge-ai-libraries
name: Loss Prevention - Object Detection
definition: >
  The Loss Prevention Object Detection Pipeline uses YOLO 11n for retail
  object detection, designed for benchmarking and standalone detection
  scenarios in self-checkout loss prevention applications. This pipeline
  performs detection only without classification, suitable for measuring
  baseline detection throughput and latency.
tags:
  - Retail
  - Loss Prevention
thumbnail: images/goods-detection.png
variants:
  - name: CPU
    pipeline_description: >-
      filesrc location=/videos/input/items-in-basket.mp4 !
      decodebin3 !
      gvadetect
        batch-size=1
        model-instance-id=detect0-cpu
        model=/models/output/public/yolo11n/INT8/yolo11n.xml
        threshold=0.5
        inference-interval=3
        scale-method=fast
        device=CPU
        pre-process-backend=opencv
        ie-config=CPU_THROUGHPUT_STREAMS=2
        nireq=2 !
      queue !
      gvatrack tracking-type=zero-term-imageless !
      queue !
      gvafpscounter starting-frame=100 !
      gvawatermark !
      gvametaconvert format=json !
      queue !
      gvametapublish file-format=json-lines file-path=/dev/null !
      videoscale !
      video/x-raw,width=320,height=240 !
      fakesink name=default_output_sink sync=false async=false
  - name: GPU
    pipeline_description: >-
      filesrc location=/videos/input/items-in-basket.mp4 !
      decodebin3 !
      gvadetect
        batch-size=1
        model-instance-id=detect0-gpu
        model=/models/output/public/yolo11n/INT8/yolo11n.xml
        threshold=0.5
        inference-interval=3
        scale-method=fast
        device=GPU
        pre-process-backend=va-surface-sharing
        ie-config=GPU_THROUGHPUT_STREAMS=2
        nireq=2 !
      queue !
      gvatrack tracking-type=zero-term-imageless !
      queue !
      gvafpscounter starting-frame=100 !
      gvawatermark !
      gvametaconvert format=json !
      queue !
      gvametapublish file-format=json-lines file-path=/dev/null !
      videoscale !
      video/x-raw,width=320,height=240 !
      fakesink name=default_output_sink sync=false async=false
  - name: NPU
    pipeline_description: >-
      filesrc location=/videos/input/items-in-basket.mp4 !
      decodebin3 !
      gvadetect
        batch-size=1
        model-instance-id=detect0-npu
        model=/models/output/public/yolo11n/INT8/yolo11n.xml
        threshold=0.5
        inference-interval=3
        scale-method=fast
        device=NPU
        pre-process-backend=va
        nireq=4 !
      queue !
      gvatrack tracking-type=zero-term-imageless !
      queue !
      gvafpscounter starting-frame=100 !
      gvawatermark !
      gvametaconvert format=json !
      queue !
      gvametapublish file-format=json-lines file-path=/dev/null !
      videoscale !
      video/x-raw,width=320,height=240 !
      fakesink name=default_output_sink sync=false async=false

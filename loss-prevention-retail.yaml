# Reference: Loss Prevention - Retail Object Detection & Classification pipeline
# https://github.com/open-edge-platform/edge-ai-libraries
name: Loss Prevention - Retail Detection & Classification
definition: >
  The Loss Prevention Retail Pipeline uses YOLO 11n for object detection and
  EfficientNet B0 for classification, designed for self-checkout and retail
  loss prevention applications. It detects retail-related objects and classifies
  them into specific categories, supporting workloads such as items-in-basket
  verification, fake scan detection, multi-product identification, product
  switching, and hidden item detection.
tags:
  - Retail
  - Loss Prevention
thumbnail: images/goods-detection-and-classification.png
variants:
  - name: CPU
    pipeline_description: >-
      filesrc location=/videos/input/items-in-basket.mp4 !
      decodebin3 !
      gvadetect
        batch-size=1
        model-instance-id=detect0-cpu
        model=/models/output/public/yolo11n/INT8/yolo11n.xml
        threshold=0.5
        inference-interval=3
        scale-method=fast
        device=CPU
        pre-process-backend=opencv
        ie-config=CPU_THROUGHPUT_STREAMS=2
        nireq=2 !
      queue !
      gvatrack tracking-type=zero-term-imageless !
      queue !
      gvaclassify
        batch-size=1
        model-instance-id=classify0-cpu
        model=/models/output/object_classification/efficientnet-b0/INT8/efficientnet-b0.xml
        model-proc=/models/output/object_classification/efficientnet-b0/efficientnet-b0.json
        device=CPU
        inference-region=roi-list
        pre-process-backend=opencv
        ie-config=CPU_THROUGHPUT_STREAMS=2
        nireq=2
        reclassify-interval=1 !
      queue !
      gvafpscounter starting-frame=100 !
      gvawatermark !
      gvametaconvert format=json !
      queue !
      gvametapublish file-format=json-lines file-path=/dev/null !
      videoscale !
      video/x-raw,width=320,height=240 !
      fakesink name=default_output_sink sync=false async=false
